<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>战队积分对抗榜</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff6f1;
    --bg-2:#ffeef0;
    --ink:#47203f;
    --ink-dim:#a3648b;
    --ink-faint:#c99cb4;
    --line:rgba(226,77,141,.20);
    --line-soft:rgba(226,77,141,.10);
    --glass:rgba(255,255,255,.55);
    --glass-2:rgba(255,255,255,.78);
    --accent:#ff2d80;
    --accent-deep:#e0136a;
    --gold:#f59e0b;
    --pos:#0aa87b;
    --neg:#ef2d56;
    --gap:clamp(8px,1vw,16px);
    --ui:'Sora','Noto Sans SC',sans-serif;
    --cjk:'Noto Sans SC','Sora',sans-serif;
    --num:'Sora',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--ui);background:var(--bg);color:var(--ink);
    overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;
    font-feature-settings:"tnum" 1,"ss01" 1;
  }
  /* ---------------- atmosphere ---------------- */
  .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .bg-base{background:
    radial-gradient(125% 95% at 50% -12%,#fff9f4 0%,#fff2f0 42%,#ffe9ef 100%),
    radial-gradient(55% 45% at 16% 6%,rgba(255,45,128,.10),transparent 60%),
    radial-gradient(55% 45% at 86% 8%,rgba(168,85,247,.08),transparent 60%);}
  /* pastel blush clouds */
  .bg-neb{opacity:.9;
    background:
      radial-gradient(40% 32% at 24% 30%,rgba(255,45,128,.12),transparent 70%),
      radial-gradient(36% 30% at 80% 24%,rgba(168,85,247,.11),transparent 70%),
      radial-gradient(48% 42% at 64% 80%,rgba(255,107,61,.10),transparent 72%),
      radial-gradient(24% 20% at 47% 50%,rgba(245,158,11,.08),transparent 70%);
    animation:nebdrift 80s ease-in-out infinite alternate;}
  @keyframes nebdrift{from{transform:translate3d(-1.6%,-1%,0) scale(1.04)}to{transform:translate3d(1.8%,1.4%,0) scale(1.12)}}
  /* satin sheen band */
  .bg-band{opacity:.65;
    background:linear-gradient(116deg,transparent 28%,rgba(255,150,190,.10) 44%,rgba(216,180,254,.12) 50%,rgba(255,150,190,.10) 56%,transparent 72%);
    filter:blur(3px);animation:bandbreathe 14s ease-in-out infinite;}
  @keyframes bandbreathe{0%,100%{opacity:.5}50%{opacity:.78}}
  .bg-grid-fine{
    background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:30px 30px;opacity:.28;
    mask-image:radial-gradient(ellipse 80% 70% at 50% 44%,#000 8%,transparent 78%);}
  .bg-grid-wide{
    background-image:linear-gradient(rgba(226,77,141,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(226,77,141,.05) 1px,transparent 1px);
    background-size:150px 150px;animation:pan 80s linear infinite;
    mask-image:radial-gradient(ellipse 90% 80% at 50% 44%,#000 12%,transparent 82%);}
  @keyframes pan{to{background-position:150px 150px}}
  #fx{position:fixed;inset:0;z-index:1;pointer-events:none;}
  .bg-beam{overflow:hidden;}
  .bg-beam::before{content:"";position:absolute;top:-60%;left:-40vw;width:48vw;height:220%;
    background:linear-gradient(90deg,transparent,rgba(255,45,128,.06),transparent);
    transform:rotate(14deg);filter:blur(10px);animation:sweep 18s linear infinite;}
  @keyframes sweep{0%{left:-48vw}100%{left:140vw}}
  .ring{position:fixed;z-index:1;pointer-events:none;opacity:.3;}
  .ring.r1{top:-9vw;right:-7vw;width:30vw;animation:spin 80s linear infinite;}
  .ring.r2{bottom:-11vw;left:-8vw;width:24vw;animation:spin 110s linear infinite reverse;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .bg-vig{z-index:2;background:radial-gradient(ellipse 80% 76% at 50% 44%,transparent 55%,rgba(255,190,205,.35) 100%);}
  .bg-noise{opacity:.03;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .bootscan{position:fixed;inset:0;z-index:40;pointer-events:none;width:55vw;
    background:linear-gradient(90deg,transparent,rgba(255,45,128,.14),transparent);
    animation:boot 1.2s cubic-bezier(.4,0,.15,1) forwards;}
  @keyframes boot{0%{left:-55vw;opacity:1}100%{left:120vw;opacity:0}}

  /* ---------------- shell ---------------- */
  .shell{position:relative;z-index:3;height:100vh;display:flex;flex-direction:column;
    padding:clamp(12px,1.7vh,22px) clamp(16px,1.9vw,34px) clamp(14px,1.7vh,24px);}

  /* ---------------- header ---------------- */
  header{display:flex;align-items:center;gap:var(--gap);flex-wrap:wrap;
    padding-bottom:clamp(10px,1.4vh,18px);border-bottom:1px solid var(--line);position:relative;}
  header::after{content:"";position:absolute;left:0;bottom:-1px;width:120px;height:2px;background:linear-gradient(90deg,var(--accent),#ff6b3d,transparent);box-shadow:0 0 12px rgba(255,45,128,.4);}
  .brand{display:flex;align-items:center;gap:clamp(13px,1.3vw,24px);min-width:0;animation:rise .8s .05s both;}
  .logo{height:clamp(24px,2.4vw,40px);aspect-ratio:600 / 153;width:auto;flex:none;
    background:linear-gradient(100deg,#ff2d80 0%,#ff6b3d 25%,#e0136a 45%,#ff8fb8 60%,#a855f7 80%,#ff2d80 100%);
    background-size:240% 100%;
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
    -webkit-mask-position:left center;mask-position:left center;
    -webkit-mask-size:contain;mask-size:contain;
    opacity:.95;
    filter:drop-shadow(0 0 1px rgba(255,140,180,.5)) drop-shadow(0 0 12px rgba(255,45,128,.28));
    animation:titleShimmer 5.5s linear infinite;}
  @media(prefers-reduced-motion:reduce){.logo{animation:none;}}
  .vbar{width:1px;align-self:stretch;margin:clamp(3px,.5vh,7px) 0;flex:none;
    background:linear-gradient(180deg,transparent,var(--line),transparent);}
  .titles{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .kicker{display:flex;align-items:center;gap:.85em;font-size:clamp(9px,.75vw,12px);font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-dim);}
  #subtitle{font-family:'Chakra Petch','Sora',sans-serif;font-weight:600;font-size:inherit;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);
    background:transparent;border:0;outline:none;min-width:6ch;cursor:text;text-shadow:0 0 12px rgba(255,45,128,.25);}
  #subtitle:focus{color:var(--ink);}
  .live{display:inline-flex;align-items:center;gap:.45em;color:var(--neg);letter-spacing:.2em;}
  .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--neg);box-shadow:0 0 9px var(--neg);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .clk{color:var(--ink-dim);letter-spacing:.16em;font-variant-numeric:tabular-nums;}
  #title{font-family:var(--cjk);font-weight:900;
    font-size:clamp(24px,2.95vw,50px);letter-spacing:.085em;line-height:1.04;
    background:linear-gradient(100deg,#ff2d80 0%,#ff6b3d 25%,#e0136a 45%,#ff8fb8 60%,#a855f7 80%,#ff2d80 100%);
    background-size:240% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    border:0;outline:none;background-color:transparent;max-width:46vw;cursor:text;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:.16em;
    transform:skewX(-8deg);transform-origin:left center;caret-color:var(--accent);
    filter:drop-shadow(0 0 1px rgba(255,140,180,.45)) drop-shadow(0 0 20px rgba(255,45,128,.3)) drop-shadow(0 2px 0 rgba(255,255,255,.6));
    animation:titleShimmer 5.5s linear infinite;}
  #title:focus{outline:1px solid var(--line);outline-offset:6px;border-radius:6px;}
  @keyframes titleShimmer{0%{background-position:150% 0}100%{background-position:-50% 0}}
  @media(prefers-reduced-motion:reduce){#title{animation:none;}}
  .spacer{flex:1 1 auto;}

  /* control cluster */
  .cluster{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .seg{display:flex;align-items:center;gap:2px;padding:4px;border:1px solid var(--line);border-radius:13px;
    background:var(--glass);backdrop-filter:blur(10px);}
  .seg .lbl{font-size:clamp(8px,.66vw,10px);font-weight:600;letter-spacing:.22em;color:var(--ink-faint);text-transform:uppercase;padding:0 7px 0 5px;}
  .chip{font-family:var(--num);font-weight:600;font-size:clamp(12px,1vw,15px);font-variant-numeric:tabular-nums;
    color:var(--ink-dim);background:transparent;border:0;border-radius:9px;padding:.42em .7em;cursor:pointer;
    transition:.16s;min-width:2.3em;}
  .chip:hover{color:var(--ink);background:var(--glass-2);}
  .chip.on{color:#fff;background:var(--accent);box-shadow:0 0 16px rgba(255,45,128,.35);}
  #customStep{width:5.2em;text-align:center;color:var(--ink);
    background:var(--glass-2);border:1px solid var(--line);
    -moz-appearance:textfield;appearance:textfield;}
  #customStep::-webkit-outer-spin-button,
  #customStep::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  #customStep::placeholder{color:var(--ink-faint);font-weight:600;letter-spacing:.04em;}
  #customStep:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,45,128,.18);}
  #customStep.on{color:#fff;background:var(--accent);border-color:transparent;box-shadow:0 0 16px rgba(255,45,128,.35);}
  #customStep.on::placeholder{color:rgba(255,255,255,.7);}
  .tbtn{font-family:var(--ui);font-weight:500;font-size:clamp(11px,.85vw,13.5px);letter-spacing:.04em;
    color:var(--ink-dim);background:var(--glass);border:1px solid var(--line);border-radius:11px;
    padding:.6em .85em;cursor:pointer;transition:.16s;backdrop-filter:blur(10px);display:inline-flex;align-items:center;gap:.45em;white-space:nowrap;}
  .tbtn .ic{font-size:1.05em;line-height:1;color:var(--ink-dim);transition:.16s;}
  .tbtn:hover{color:var(--ink);border-color:rgba(255,45,128,.45);background:var(--glass-2);}
  .tbtn:hover .ic{color:var(--accent);}
  .tbtn.warn:hover{border-color:rgba(239,45,86,.5);} .tbtn.warn:hover .ic{color:var(--neg);}
  .tbtn.active{color:#fff;background:var(--accent);border-color:var(--accent);}
  .tbtn.active .ic{color:#fff;}

  /* ---------------- body ---------------- */
  .body{flex:1 1 auto;display:grid;grid-template-columns:1fr clamp(248px,23vw,372px);gap:var(--gap);padding-top:var(--gap);min-height:0;}
  .board{display:flex;flex-direction:column;gap:clamp(6px,.85vh,11px);min-height:0;overflow:hidden;}

  /* ---------------- team row ---------------- */
  .row{position:relative;display:grid;
    grid-template-columns:clamp(50px,4.4vw,84px) 1fr auto;align-items:center;gap:clamp(12px,1.4vw,26px);
    background:linear-gradient(100deg,rgba(255,255,255,.9),rgba(255,255,255,.65) 60%);
    border:1px solid var(--line);border-radius:15px;
    padding:clamp(8px,1.05vh,16px) clamp(16px,1.5vw,28px) clamp(8px,1.05vh,16px) clamp(22px,1.9vw,34px);
    flex:1 1 0;min-height:0;overflow:hidden;backdrop-filter:blur(8px);
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 10px 30px -18px rgba(226,77,141,.4);
    will-change:transform;}
  .row .edge{position:absolute;left:0;top:14%;bottom:14%;width:3px;border-radius:0 3px 3px 0;
    background:var(--tc,var(--accent));box-shadow:0 0 14px color-mix(in srgb,var(--tc) 55%,transparent);}
  .rk{position:relative;z-index:1;text-align:center;line-height:1;}
  .rk .n{font-family:var(--num);font-weight:700;font-variant-numeric:tabular-nums;
    font-size:clamp(24px,2.9vw,50px);color:var(--ink-dim);letter-spacing:-.02em;transition:color .4s;}
  .rk .lbl{display:block;font-size:clamp(7px,.6vw,9.5px);font-weight:600;letter-spacing:.28em;color:var(--ink-faint);margin-top:.45em;text-transform:uppercase;}
  .mid{position:relative;z-index:1;min-width:0;display:flex;flex-direction:column;gap:clamp(6px,.85vh,11px);}
  .nrow{display:flex;align-items:center;gap:.6em;min-width:0;}
  .dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--tc);box-shadow:0 0 9px color-mix(in srgb,var(--tc) 70%,transparent);}
  .name{font-family:var(--cjk);font-weight:700;font-size:clamp(16px,1.85vw,31px);letter-spacing:.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .name input{font:inherit;color:var(--ink);background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:7px;padding:.1em .45em;width:min(100%,15ch);outline:none;}
  .name input:focus{border-color:var(--tc);}
  .lead{display:none;font-size:clamp(8px,.66vw,11px);font-weight:600;letter-spacing:.24em;text-transform:uppercase;
    color:var(--gold);border:1px solid color-mix(in srgb,var(--gold) 45%,transparent);border-radius:99px;padding:.22em .7em;flex:none;
    background:color-mix(in srgb,var(--gold) 10%,transparent);}
  .bar{height:clamp(5px,.7vh,8px);border-radius:99px;background:rgba(226,77,141,.12);overflow:hidden;position:relative;}
  .bar i{position:absolute;inset:0 100% 0 0;border-radius:99px;
    background:linear-gradient(90deg,color-mix(in srgb,var(--tc) 25%,transparent),var(--tc));
    transition:right .65s cubic-bezier(.22,.7,.2,1);}
  .bar i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
    transform:translateX(-100%);animation:barsheen 3.4s ease-in-out infinite;}
  @keyframes barsheen{0%,72%{transform:translateX(-100%)}100%{transform:translateX(220%)}}
  .right{position:relative;z-index:1;display:flex;align-items:center;gap:clamp(10px,1.1vw,20px);}
  .score{font-family:var(--num);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;
    font-size:clamp(30px,3.7vw,64px);line-height:.95;min-width:2.6ch;text-align:right;color:var(--ink);
    text-shadow:0 0 26px rgba(255,45,128,.14);}
  .pm{display:flex;gap:7px;}
  .pm button{font-family:var(--ui);font-weight:400;font-size:clamp(22px,2vw,30px);line-height:1;
    width:clamp(42px,3.7vw,62px);height:clamp(42px,3.7vw,62px);border-radius:13px;cursor:pointer;
    border:1px solid var(--line);background:rgba(255,255,255,.7);color:var(--ink-dim);
    transition:transform .1s,border-color .16s,color .16s,background .16s,box-shadow .16s;display:grid;place-items:center;}
  .pm .plus:hover{color:var(--pos);border-color:color-mix(in srgb,var(--pos) 55%,transparent);background:color-mix(in srgb,var(--pos) 10%,transparent);box-shadow:0 0 18px -4px var(--pos);}
  .pm .minus:hover{color:var(--neg);border-color:color-mix(in srgb,var(--neg) 55%,transparent);background:color-mix(in srgb,var(--neg) 10%,transparent);box-shadow:0 0 18px -4px var(--neg);}
  .pm button:active{transform:scale(.9);}

  /* leader treatment */
  .row.top1{border-color:color-mix(in srgb,var(--gold) 42%,var(--line));
    box-shadow:0 0 0 1px color-mix(in srgb,var(--gold) 22%,transparent),0 16px 40px -22px rgba(245,158,11,.5);}
  .row.top1 .edge{background:var(--gold);box-shadow:0 0 16px color-mix(in srgb,var(--gold) 65%,transparent);}
  .row.top1 .rk .n{color:var(--gold);text-shadow:0 0 20px color-mix(in srgb,var(--gold) 45%,transparent);}
  .row.top1 .lead{display:inline-block;}
  .row.top1::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:15px;
    background:linear-gradient(105deg,transparent 38%,rgba(245,158,11,.12) 50%,transparent 62%);
    background-size:260% 100%;animation:sheen 4.5s linear infinite;}
  @keyframes sheen{0%{background-position:170% 0}100%{background-position:-70% 0}}
  .score.bump{animation:bump .42s cubic-bezier(.3,1.4,.4,1);}
  @keyframes bump{0%{transform:scale(1)}38%{transform:scale(1.13)}100%{transform:scale(1)}}
  .row.flash{animation:flash .85s ease;}
  @keyframes flash{0%{box-shadow:0 0 0 0 transparent}26%{box-shadow:0 0 26px -2px color-mix(in srgb,var(--tc) 60%,transparent)}100%{box-shadow:none}}

  /* edit mode */
  body.editing .pm{display:none;}
  body.editing .bar{opacity:.35;}
  body.editing .lead{display:none!important;}
  body.editing .row .del{display:grid;place-items:center;position:absolute;z-index:4;top:7px;right:9px;
    width:25px;height:25px;border-radius:50%;border:1px solid color-mix(in srgb,var(--neg) 55%,transparent);
    background:rgba(255,240,243,.9);color:var(--neg);font-size:16px;cursor:pointer;line-height:1;}
  body.editing .row .del:hover{background:var(--neg);color:#fff;}
  .row .del{display:none;}
  .editscore{font-family:var(--num);font-size:clamp(20px,2.2vw,34px);font-weight:700;text-align:center;
    font-variant-numeric:tabular-nums;color:var(--ink);background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:9px;padding:.08em .4em;outline:none;
    width:5ch;min-width:3ch;max-width:9.5ch;-moz-appearance:textfield;appearance:textfield;}
  .editscore::-webkit-outer-spin-button,
  .editscore::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .editscore:focus{border-color:var(--tc);}
  .addteam{display:none;}
  body.editing .addteam{display:flex;align-items:center;justify-content:center;gap:.55em;cursor:pointer;flex:none;
    border:1px dashed var(--line);border-radius:15px;color:var(--ink-faint);background:var(--glass);
    font-weight:500;font-size:clamp(13px,1.15vw,17px);letter-spacing:.1em;padding:clamp(8px,1.1vh,14px);transition:.16s;}
  body.editing .addteam:hover{border-color:rgba(255,45,128,.5);color:var(--accent);}

  /* ---------------- activity log ---------------- */
  .log{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:17px;display:flex;flex-direction:column;
    min-height:0;backdrop-filter:blur(12px);overflow:hidden;box-shadow:0 14px 40px -26px rgba(226,77,141,.45);}
  .log h2{display:flex;align-items:center;gap:.7em;font-size:clamp(9px,.78vw,12px);font-weight:600;letter-spacing:.26em;
    text-transform:uppercase;color:var(--ink-dim);padding:clamp(13px,1.6vh,18px) clamp(15px,1.3vw,20px) clamp(11px,1.2vh,14px);border-bottom:1px solid var(--line);}
  .log h2 .d{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 9px var(--pos);animation:pulse 1.7s infinite;}
  .log h2 .count{margin-left:auto;color:var(--ink);background:var(--glass-2);border:1px solid var(--line);border-radius:99px;padding:.12em .75em;font-size:.92em;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
  .entries{flex:1 1 auto;overflow-y:auto;padding:clamp(5px,.7vh,9px) clamp(6px,.6vw,10px);display:flex;flex-direction:column;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  .entries::-webkit-scrollbar{width:5px}.entries::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
  .entry{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;
    padding:.62em .65em;border-bottom:1px solid var(--line-soft);font-size:clamp(11px,1vw,15px);animation:slidein .35s ease;}
  .entry:last-child{border-bottom:0;}
  @keyframes slidein{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
  .entry .t{color:var(--ink-faint);font-variant-numeric:tabular-nums;font-size:.84em;letter-spacing:.06em;}
  .entry .nm{display:flex;align-items:center;gap:.5em;font-weight:500;min-width:0;}
  .entry .nm b{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);font-family:var(--cjk);}
  .entry .nm .cd{width:7px;height:7px;border-radius:50%;flex:none;background:var(--en-c,#888);}
  .entry .d{font-weight:600;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;letter-spacing:.02em;}
  .entry .d .to{color:var(--ink-faint);font-weight:400;font-size:.82em;margin-left:.25em;}
  .entry.pos .d{color:var(--pos)} .entry.neg .d{color:var(--neg)}
  .empty{margin:auto;color:var(--ink-faint);text-align:center;font-size:clamp(11px,1vw,14px);line-height:1.8;padding:1.2em;}

  /* toast */
  #toast{position:fixed;left:50%;top:clamp(76px,12vh,120px);transform:translateX(-50%) translateY(-14px) scale(.96);z-index:50;
    display:flex;align-items:center;gap:.6em;
    background:rgba(255,255,255,.92);border:1px solid color-mix(in srgb,var(--gold) 38%,var(--line));border-radius:14px;
    padding:.7em 1.3em;color:var(--ink);font-weight:600;letter-spacing:.06em;backdrop-filter:blur(14px);
    opacity:0;pointer-events:none;transition:.32s cubic-bezier(.2,.9,.2,1);box-shadow:0 18px 50px -20px rgba(226,77,141,.5),0 0 30px -8px rgba(245,158,11,.35);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}

  /* entrance */
  @keyframes rise{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
  @keyframes rowin{from{opacity:0;transform:translateY(14px);filter:blur(3px)}to{opacity:1;transform:none;filter:none}}
  @media(prefers-reduced-motion:reduce){.bg-beam::before,.ring,.bg-grid-wide,.bg-neb,.bg-band,.bar i::after,.row.top1::after{animation:none!important}}
  @media(max-width:820px){.body{grid-template-columns:1fr;grid-template-rows:1fr auto}.log{max-height:32vh}#title{max-width:62vw;font-size:23px}}
</style>

<script>
(function(){
  "use strict";
  const PALETTE=["#ff2d80","#ff6b3d","#a855f7","#e11d48","#f59e0b","#0ea5a4","#d946ef","#2563eb","#db2777","#16a34a"];
  const STORE="teamScoreboard.v2";
  const $=s=>document.querySelector(s);
  const board=$("#board"), entriesEl=$("#entries"), logCountEl=$("#logCount"), titleEl=$("#title"), subEl=$("#subtitle");

  let state={ title:"战队积分对抗榜", subtitle:"HYMN BATTLE ARENA", step:500, teams:[], history:[], sound:true };
  let editing=false, uid=Date.now();
  const rowEls={}, shownScore={}; let bootIdx=0;

  /* ---------- persistence ---------- */
  function save(){ try{ localStorage.setItem(STORE,JSON.stringify(state)); }catch(e){} }
  function load(){ try{ const r=localStorage.getItem(STORE); if(r){ const p=JSON.parse(r); if(p&&p.teams) return p; } }catch(e){} return null; }
  function seed(){ const names=["雷霆战队","烈焰战队","苍穹战队","破晓战队"];
    state.teams=names.map((n,i)=>({id:++uid,name:n,score:0,color:PALETTE[i%PALETTE.length]})); }

  /* ---------- helpers ---------- */
  function nowStr(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds()); }
  function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2000); }
  function sorted(){ return state.teams.slice().sort((a,b)=> b.score-a.score || a.id-b.id ); }
  function rankMap(){ const m={}; sorted().forEach((t,i)=>m[t.id]=i); return m; }
  function leaderId(){ const s=sorted(); return (s[0]&&s[0].score>0)?s[0].id:null; }
  function escAttr(s){ return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
  function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  /* ---------- premium sound engine ---------- */
  const Sound=(function(){
    let ctx,master,reverb,enabled=true;
    function ir(sec,decay){ const r=ctx.sampleRate,len=Math.floor(r*sec),b=ctx.createBuffer(2,len,r);
      for(let ch=0;ch<2;ch++){ const d=b.getChannelData(ch); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); } return b; }
    function build(){
      ctx=new (window.AudioContext||window.webkitAudioContext)();
      const comp=ctx.createDynamicsCompressor();
      comp.threshold.value=-18; comp.ratio.value=4; comp.attack.value=.003; comp.release.value=.25;
      comp.connect(ctx.destination);
      master=ctx.createGain(); master.gain.value=.85; master.connect(comp);
      reverb=ctx.createConvolver(); reverb.buffer=ir(2.2,3.4);
      const rg=ctx.createGain(); rg.gain.value=.5; reverb.connect(rg).connect(master);
      Sound._rev=reverb;
    }
    function ac(){ try{ if(!ctx) build(); if(ctx.state==="suspended") ctx.resume(); }catch(e){} return ctx; }
    // bell-like voice: carrier + soft octave, lowpass, exp decay, reverb send
    function voice(freq,when,dur,gain,send){
      const o=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain(),lp=ctx.createBiquadFilter(),s=ctx.createGain();
      o.type="sine"; o2.type="sine"; o.frequency.value=freq; o2.frequency.value=freq*2.005;
      lp.type="lowpass"; lp.frequency.setValueAtTime(Math.min(9000,freq*7),when); lp.frequency.exponentialRampToValueAtTime(Math.max(400,freq*2.2),when+dur);
      g.gain.setValueAtTime(.0001,when);
      g.gain.exponentialRampToValueAtTime(gain,when+.008);
      g.gain.exponentialRampToValueAtTime(.0001,when+dur);
      const og=ctx.createGain(); og.gain.value=.32;
      o.connect(lp); o2.connect(og).connect(lp); lp.connect(g); g.connect(master);
      s.gain.value=send; g.connect(s).connect(reverb);
      o.start(when);o2.start(when);o.stop(when+dur+.05);o2.stop(when+dur+.05);
    }
    function noise(when,dur,gain,freq,q){
      const len=Math.floor(ctx.sampleRate*dur),b=ctx.createBuffer(1,len,ctx.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);
      const snd=ctx.createBufferSource(); snd.buffer=b;
      const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=freq; bp.Q.value=q||1;
      const g=ctx.createGain(); g.gain.value=gain;
      snd.connect(bp).connect(g).connect(master); snd.start(when);
    }
    return {
      set:v=>{enabled=v;}, get:()=>enabled, unlock:()=>ac(),
      up(){ if(!enabled)return; const c=ac(); if(!c)return; const t=c.currentTime+.001;
        noise(t,.028,.05,3200,1.2);
        voice(1244.5,t,1.0,.11,.28);          // soft high bell
        voice(1864.7,t+.012,.7,.045,.3);       // shimmer partial
      },
      down(){ if(!enabled)return; const c=ac(); if(!c)return; const t=c.currentTime+.001;
        noise(t,.03,.04,900,.8);
        voice(311.1,t,.6,.11,.2);
        voice(207.7,t,.7,.06,.2);
      },
      overtake(){ if(!enabled)return; const c=ac(); if(!c)return; const t=c.currentTime+.02;
        const notes=[523.25,659.25,783.99,1046.5,1318.5];
        notes.forEach((f,i)=>voice(f,t+i*.085,1.7,.11,.5));
        voice(2093,t+notes.length*.085,1.9,.04,.6);
        noise(t,.5,.03,1800,.5);
        const o=c.createOscillator(),g=c.createGain(); o.type="sine"; o.frequency.value=98;
        g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.05,t+.22); g.gain.exponentialRampToValueAtTime(.0001,t+1.3);
        o.connect(g).connect(master); o.start(t); o.stop(t+1.5);
      }
    };
  })();

  function unlockSoundOnce(){
    Sound.unlock();
    window.removeEventListener("pointerdown",unlockSoundOnce);
    window.removeEventListener("keydown",unlockSoundOnce);
    window.removeEventListener("touchstart",unlockSoundOnce);
  }
  window.addEventListener("pointerdown",unlockSoundOnce,{passive:true});
  window.addEventListener("keydown",unlockSoundOnce);
  window.addEventListener("touchstart",unlockSoundOnce,{passive:true});

  /* ---------- number tween ---------- */
  function tween(el,to){
    const id=el.dataset.id; let from=shownScore[id]!==undefined?shownScore[id]:to;
    if(from===to){ el.textContent=to; return; }
    const start=performance.now(),dur=460;
    shownScore[id]=to;
    (function frame(now){ let p=Math.min(1,(now-start)/dur); p=1-Math.pow(1-p,3);
      el.textContent=Math.round(from+(to-from)*p); if(p<1) requestAnimationFrame(frame); else el.textContent=to; })(start);
  }

  /* ---------- build row ---------- */
  function buildRow(t){
    const row=document.createElement("div");
    row.className="row"; row.dataset.id=t.id; row.style.setProperty("--tc",t.color);
    row.style.animation="rowin .55s "+Math.min(.6,bootIdx++*.07)+"s both";
    row.addEventListener("animationend",function clr(e){ if(e.animationName==="rowin"){ row.style.animation=""; row.removeEventListener("animationend",clr); }});
    row.innerHTML=
      '<span class="edge"></span>'+
      '<button class="del" title="移除战队">×</button>'+
      '<div class="rk"><span class="n">01</span><span class="lbl">Rank</span></div>'+
      '<div class="mid"><div class="nrow"><span class="dot"></span><span class="name"><span class="nametxt"></span></span><span class="lead">Leader</span></div>'+
      '<div class="bar"><i></i></div></div>'+
      '<div class="right"><div class="score" data-id="'+t.id+'">0</div>'+
      '<div class="pm"><button class="minus" title="减分">−</button><button class="plus" title="加分">＋</button></div></div>';
    row.querySelector(".plus").addEventListener("click",()=>change(t.id,+state.step));
    row.querySelector(".minus").addEventListener("click",()=>change(t.id,-state.step));
    row.querySelector(".del").addEventListener("click",()=>removeTeam(t.id));
    return row;
  }

  /* ---------- render (FLIP) ---------- */
  function _render(){
    const order=sorted(), rmap=rankMap();
    const maxScore=Math.max(1,...state.teams.map(t=>Math.max(0,t.score)));
    Object.keys(rowEls).forEach(id=>{ if(!state.teams.some(t=>String(t.id)===id)){ rowEls[id].remove(); delete rowEls[id]; delete shownScore[id]; }});
    const first={}; Object.values(rowEls).forEach(el=>first[el.dataset.id]=el.getBoundingClientRect());

    state.teams.forEach(t=>{
      let el=rowEls[t.id];
      if(!el){ el=buildRow(t); rowEls[t.id]=el; board.appendChild(el); }
      el.style.setProperty("--tc",t.color);
      const nm=el.querySelector(".name"), right=el.querySelector(".right");
      if(editing){
        if(!nm.querySelector("input")){ nm.innerHTML='<input maxlength="12" value="'+escAttr(t.name)+'">';
          nm.querySelector("input").addEventListener("input",e=>{ t.name=e.target.value; save(); }); }
        else nm.querySelector("input").value=t.name;
        if(!right.querySelector(".editscore")){ const es=document.createElement("input");
          es.type="number"; es.className="editscore"; es.value=t.score; fitEditScore(es);
          es.addEventListener("input",e=>{ t.score=parseInt(e.target.value||"0",10)||0; fitEditScore(es); queueRender(); save(); });
          right.querySelector(".score").style.display="none"; right.insertBefore(es,right.querySelector(".pm")); }
        else { const es=right.querySelector(".editscore"); if(document.activeElement!==es) es.value=t.score; fitEditScore(es); }
      }else{
        if(nm.querySelector("input")) nm.innerHTML='<span class="nametxt"></span>';
        nm.querySelector(".nametxt").textContent=t.name;
        const es=right.querySelector(".editscore"); if(es) es.remove();
        right.querySelector(".score").style.display=""; tween(right.querySelector(".score"),t.score);
      }
      const rk=rmap[t.id];
      el.querySelector(".rk .n").textContent=String(rk+1).padStart(2,"0");
      el.querySelector(".bar i").style.right=(100-Math.max(0,t.score)/maxScore*100)+"%";
      el.classList.toggle("top1",rk===0 && order.length>1 && t.score>0);
    });

    order.forEach(t=>board.appendChild(rowEls[t.id]));
    order.forEach(t=>{ const el=rowEls[t.id],f=first[t.id]; if(!f)return;
      const last=el.getBoundingClientRect(),dy=f.top-last.top;
      if(Math.abs(dy)>1){ el.style.transition="none"; el.style.transform="translateY("+dy+"px)";
        requestAnimationFrame(()=>{ el.style.transition="transform .6s cubic-bezier(.22,.7,.2,1)"; el.style.transform=""; }); }
    });
  }
  let raf; function queueRender(){ cancelAnimationFrame(raf); raf=requestAnimationFrame(render); }

  /* ---------- scoring ---------- */
  function change(id,delta){
    if(!delta) return; const t=state.teams.find(x=>x.id===id); if(!t) return;
    Sound.unlock();
    const prevLeader=leaderId();
    t.score+=delta;
    state.history.unshift({time:nowStr(),name:t.name,color:t.color,delta,to:t.score});
    if(state.history.length>500) state.history.length=500;
    const newLeader=leaderId();
    render(); renderLog(); save();
    const el=rowEls[id]; if(el){ const sc=el.querySelector(".score"); sc.classList.remove("bump"); void sc.offsetWidth; sc.classList.add("bump");
      el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash"); }
    if(delta>0) Sound.up(); else Sound.down();
    if(newLeader && prevLeader && newLeader!==prevLeader){
      Sound.overtake();
      const lead=state.teams.find(x=>x.id===newLeader); if(lead) toast("👑 "+lead.name+" 反超登顶");
      const lel=rowEls[newLeader]; if(lel){ lel.classList.remove("flash"); void lel.offsetWidth; lel.classList.add("flash"); }
    }
  }
  function undo(){ const last=state.history.shift(); if(!last){ toast("没有可撤销的记录"); return; }
    const t=state.teams.find(x=>x.name===last.name); if(t&&!last.note) t.score-=last.delta;
    render(); renderLog(); save(); toast("已撤销 "+last.name+" "+(last.delta>0?"+":"")+last.delta); }
  function resetScores(){ if(!confirm("确定将所有战队分数清零吗？此操作不可撤销。")) return;
    state.teams.forEach(t=>t.score=0);
    state.history.unshift({time:nowStr(),name:"——",color:"#c99cb4",delta:0,to:0,note:"全部清零"});
    render(); renderLog(); save(); toast("已清零"); }

  /* ---------- team mgmt ---------- */
  function addTeam(){ if(state.teams.length>=10){ toast("最多 10 个战队"); return; }
    const used=state.teams.map(t=>t.color), color=PALETTE.find(c=>!used.includes(c))||PALETTE[state.teams.length%PALETTE.length];
    state.teams.push({id:++uid,name:"新战队"+(state.teams.length+1),score:0,color}); render(); save(); }
  function removeTeam(id){ if(state.teams.length<=1){ toast("至少保留 1 个战队"); return; }
    const t=state.teams.find(x=>x.id===id); if(!confirm('确定移除"'+(t?t.name:"")+'"吗？')) return;
    state.teams=state.teams.filter(x=>x.id!==id); render(); save(); }

  /* ---------- log ---------- */
  function renderLog(){ logCountEl.textContent=state.history.length;
    if(!state.history.length){ entriesEl.innerHTML='<div class="empty">暂无记录<br>每次加减分将自动记录时间，便于现场核对</div>'; return; }
    entriesEl.innerHTML=state.history.map(h=>{
      if(h.note) return '<div class="entry"><span class="t">'+h.time+'</span><span class="nm"><b style="color:var(--ink-faint)">'+escHtml(h.note)+'</b></span><span class="d"></span></div>';
      const cls=h.delta>0?"pos":h.delta<0?"neg":"", sign=h.delta>0?"+":"";
      return '<div class="entry '+cls+'"><span class="t">'+h.time+'</span><span class="nm"><span class="cd" style="background:'+h.color+'"></span><b>'+escHtml(h.name)+'</b></span><span class="d">'+sign+h.delta+'<span class="to">→ '+h.to+'</span></span></div>';
    }).join(""); }

  /* ---------- step ---------- */
  function setStep(v){ v=Math.max(100,parseInt(v,10)||100); state.step=v;
    document.querySelectorAll(".chip[data-step]").forEach(c=>c.classList.toggle("on",+c.dataset.step===v)); save(); }
  document.querySelectorAll(".chip[data-step]").forEach(c=>c.addEventListener("click",()=>{ $("#customStep").value=""; $("#customStep").classList.remove("on"); setStep(+c.dataset.step); }));
  $("#customStep").addEventListener("input",e=>{ const v=parseInt(e.target.value,10); const ok=v>=100; $("#customStep").classList.toggle("on",ok&&e.target.value!==""); if(ok){ document.querySelectorAll(".chip[data-step]").forEach(c=>c.classList.remove("on")); state.step=v; save(); }});

  /* ---------- tools ---------- */
  $("#editBtn").addEventListener("click",()=>{ editing=!editing; document.body.classList.toggle("editing",editing);
    $("#editBtn").classList.toggle("active",editing); $("#editBtn").innerHTML=editing?'<span class="ic">✓</span>完成':'<span class="ic">✎</span>编辑'; render(); });
  $("#undoBtn").addEventListener("click",undo);
  function refreshSound(){ const on=Sound.get(),b=$("#soundBtn"); b.classList.toggle("active",on); b.innerHTML=on?'<span class="ic">♪</span>音效':'<span class="ic">♪</span>静音'; }
  $("#soundBtn").addEventListener("click",()=>{ Sound.unlock(); Sound.set(!Sound.get()); state.sound=Sound.get(); if(state.sound) Sound.up(); refreshSound(); save(); });
  $("#resetBtn").addEventListener("click",resetScores);
  $("#fsBtn").addEventListener("click",()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); else document.exitFullscreen&&document.exitFullscreen(); });

  /* ---------- titles + clock ---------- */
  titleEl.addEventListener("input",()=>{ state.title=titleEl.value; document.title=titleEl.value||"战队积分榜"; save(); });
  titleEl.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); titleEl.blur(); }});
  let _subMeter=null;
  function fitEditScore(es){
    const len=(es.value!=null?String(es.value):"").length||1;
    es.style.width=(Math.max(3,len)+1.6)+"ch";
  }
  function fitSub(){
    if(!_subMeter){
      _subMeter=document.createElement("span");
      _subMeter.style.cssText="position:absolute;left:-9999px;top:-9999px;visibility:hidden;white-space:pre;pointer-events:none;";
      document.body.appendChild(_subMeter);
    }
    const cs=getComputedStyle(subEl);
    _subMeter.style.fontFamily=cs.fontFamily;
    _subMeter.style.fontWeight=cs.fontWeight;
    _subMeter.style.fontStyle=cs.fontStyle;
    _subMeter.style.fontSize=cs.fontSize;
    _subMeter.style.letterSpacing=cs.letterSpacing;
    _subMeter.style.textTransform=cs.textTransform;
    _subMeter.textContent=subEl.value||subEl.placeholder||"HYMN BATTLE ARENA";
    const w=_subMeter.getBoundingClientRect().width;
    subEl.style.width=Math.max(60,Math.ceil(w)+6)+"px";
  }
  subEl.addEventListener("input",()=>{ state.subtitle=subEl.value; fitSub(); save(); });
  subEl.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); subEl.blur(); }});
  addEventListener("resize",fitSub);
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(fitSub);
  setInterval(()=>{ $("#clk").textContent=nowStr(); },1000);

  /* add-team tile kept last */
  const addTile=document.createElement("div"); addTile.className="addteam"; addTile.textContent="＋ 添加战队"; addTile.addEventListener("click",addTeam);
  function render(){ _render(); board.appendChild(addTile); }

  /* tint logo to match the title: use its PNG alpha as a mask, fill via CSS gradient */
  (function(){ const lg=document.querySelector(".logo");
    if(lg&&lg.dataset.src){ const u="url('"+lg.dataset.src+"')"; lg.style.webkitMaskImage=u; lg.style.maskImage=u; } })();

  /* ---------- init ---------- */
  const loaded=load();
  if(loaded){ state=Object.assign(state,loaded); if(!state.history) state.history=[]; } else seed();
  /* migrate team colors saved under the old dark theme */
  (function(){ const OLD=["#5fe3ff","#7aa2ff","#a78bfa","#f4a8d4","#ffc27a","#6fe0b4","#b6e07a","#ff9d8a","#67c9ff","#cda6ff"];
    let touched=false;
    state.teams.forEach(t=>{ const i=OLD.indexOf(t.color); if(i>=0){ t.color=PALETTE[i]; touched=true; } });
    state.history.forEach(h=>{ const i=OLD.indexOf(h.color); if(i>=0) h.color=PALETTE[i]; });
    if(touched) save(); })();
  titleEl.value=state.title||"战队积分对抗榜"; document.title=titleEl.value;
  subEl.value=state.subtitle||"HYMN BATTLE ARENA"; fitSub();
  if(!(state.step>=100)) state.step=500;
  setStep(state.step);
  if(![100,200,300,500,1000].includes(state.step)){ document.querySelectorAll(".chip[data-step]").forEach(c=>c.classList.remove("on")); $("#customStep").value=state.step; $("#customStep").classList.add("on"); }
  Sound.set(state.sound!==false); refreshSound();
  $("#clk").textContent=nowStr();
  render(); renderLog();
})();
</script>
<script>
/* ---------- starfield · milky-way band · drifting dust ---------- */
(function(){
  "use strict";
  if(matchMedia&&matchMedia("(prefers-reduced-motion:reduce)").matches) return;
  const c=document.getElementById("fx"); if(!c||!c.getContext) return;
  const ctx=c.getContext("2d");
  let w,h,dpr,stars=[],motes=[],glows=[],meteors=[],nextSpawn=2.2,ox=0,oy=0;
  const R=(a,b)=>a+Math.random()*(b-a);
  const gauss=()=>(Math.random()+Math.random()+Math.random()-1.5)/1.5; // ~normal, -1..1

  function init(){
    dpr=Math.min(2,window.devicePixelRatio||1);
    w=c.width=Math.floor(innerWidth*dpr); h=c.height=Math.floor(innerHeight*dpr);
    c.style.width=innerWidth+"px"; c.style.height=innerHeight+"px";
    const area=innerWidth*innerHeight;
    // galactic band geometry (diagonal river of denser stars)
    const slope=-0.42, cx=w/2, by0=h*0.46, spread=h*0.17;
    const sn=Math.max(120,Math.min(340,Math.round(area/6800)));
    stars=[];
    for(let i=0;i<sn;i++){
      const inBand=Math.random()<0.42;
      let x=Math.random()*w, y;
      if(inBand){ const band=by0+(x-cx)*slope; y=band+gauss()*spread; if(y<0)y+=h; if(y>h)y-=h; }
      else y=Math.random()*h;
      const bright=Math.random()<0.09;
      // colour: makeup glitter — pinks, violets, golds
      let cr,cg,cb;
      const k=Math.random();
      if(k<0.55){cr=255;cg=45;cb=128;}         // fuchsia pink
      else if(k<0.8){cr=168;cg=85;cb=247;}     // violet
      else if(k<0.92){cr=255;cg=107;cb=61;}    // coral
      else {cr=245;cg=158;cb=11;}              // gold
      stars.push({x,y,r:(bright?R(1.4,2.3):R(.45,1.25))*dpr,
        base:(inBand?R(.3,.95):R(.16,.7)),ph:Math.random()*6.28,tw:R(.5,1.7),bright,cr,cg,cb});
    }
    const mn=Math.max(16,Math.min(40,Math.round(area/46000)));
    motes=[]; for(let i=0;i<mn;i++) motes.push({x:Math.random()*w,y:Math.random()*h,vx:R(-.06,.06)*dpr,vy:R(-.26,-.05)*dpr,r:R(.6,1.7)*dpr,a:R(.12,.42)});
    glows=[{x:w*.2,y:h*.22,r:R(240,340)*dpr,col:[255,45,128],a:.05,vx:.016*dpr,vy:.012*dpr},
           {x:w*.82,y:h*.7,r:R(240,360)*dpr,col:[168,85,247],a:.045,vx:-.014*dpr,vy:-.01*dpr},
           {x:w*.55,y:h*.5,r:R(280,400)*dpr,col:[255,107,61],a:.03,vx:.008*dpr,vy:-.006*dpr}]; // soft coral core
  }

  function spawnMeteor(){
    const fromLeft=Math.random()<0.5;
    const ang=R(0.18,0.40);                 // 下俯角
    const speed=R(15,24)*dpr;               // 小而快
    const vx=(fromLeft?1:-1)*Math.cos(ang)*speed, vy=Math.sin(ang)*speed;
    const x=fromLeft?R(-0.05,0.45)*w:R(0.55,1.05)*w;
    const y=R(-0.04,0.34)*h;
    const len=R(60,140)*dpr, ttl=R(46,78);
    const warm=Math.random()<0.18;
    meteors.push({x,y,vx,vy,len,life:0,ttl,
      col:warm?[245,158,11]:(Math.random()<0.5?[255,45,128]:[168,85,247])});
  }

  function loop(t){
    const tm=(t||0)*0.001;
    if(tm>=nextSpawn){ spawnMeteor(); if(Math.random()<0.25) spawnMeteor(); nextSpawn=tm+R(2.6,7.5); }
    ctx.clearRect(0,0,w,h);
    ctx.globalCompositeOperation="lighter";
    // nebula glows
    for(const o of glows){ o.x+=o.vx;o.y+=o.vy;
      if(o.x<-o.r)o.x=w+o.r; if(o.x>w+o.r)o.x=-o.r; if(o.y<-o.r)o.y=h+o.r; if(o.y>h+o.r)o.y=-o.r;
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,"rgba("+o.col[0]+","+o.col[1]+","+o.col[2]+","+o.a+")"); g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,6.2832); ctx.fill(); }
    // stars (fixed structure, slow global parallax via offset, twinkle)
    ox=(ox+0.02*dpr)%w; oy=(oy+0.008*dpr)%h;
    for(const s of stars){
      let x=s.x+ox; if(x>w)x-=w; let y=s.y+oy; if(y>h)y-=h;
      const a=s.base*(0.45+0.55*(0.5+0.5*Math.sin(tm*s.tw+s.ph)));
      if(s.bright){ ctx.shadowBlur=s.r*4; ctx.shadowColor="rgba("+s.cr+","+s.cg+","+s.cb+","+a+")"; }
      else ctx.shadowBlur=0;
      ctx.fillStyle="rgba("+s.cr+","+s.cg+","+s.cb+","+a+")";
      ctx.beginPath(); ctx.arc(x,y,s.r,0,6.2832); ctx.fill();
    }
    ctx.shadowBlur=0;
    // meteors (occasional shooting stars with fading trail)
    for(let i=meteors.length-1;i>=0;i--){ const m=meteors[i];
      m.x+=m.vx; m.y+=m.vy; m.life++;
      const p=m.life/m.ttl;
      const a=Math.max(0,Math.sin(Math.min(1,p)*Math.PI))*0.95;   // 淡入淡出
      if(p>=1||m.x< -m.len||m.x>w+m.len||m.y>h+m.len){ meteors.splice(i,1); continue; }
      const sp=Math.hypot(m.vx,m.vy)||1, ux=m.vx/sp, uy=m.vy/sp;
      const tx=m.x-ux*m.len, ty=m.y-uy*m.len;
      const cr=m.col[0],cg=m.col[1],cb=m.col[2];
      const g=ctx.createLinearGradient(m.x,m.y,tx,ty);
      g.addColorStop(0,"rgba("+cr+","+cg+","+cb+","+a+")");
      g.addColorStop(.5,"rgba("+cr+","+cg+","+cb+","+(a*.35)+")");
      g.addColorStop(1,"rgba("+cr+","+cg+","+cb+",0)");
      ctx.strokeStyle=g; ctx.lineWidth=1.5*dpr; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.shadowBlur=9*dpr; ctx.shadowColor="rgba("+cr+","+cg+","+cb+","+a+")";
      ctx.fillStyle="rgba("+cr+","+cg+","+cb+","+a+")";
      ctx.beginPath(); ctx.arc(m.x,m.y,1.5*dpr,0,6.2832); ctx.fill();
      ctx.shadowBlur=0;
    }
    // near dust motes + very faint constellation links
    const maxd=96*dpr,md2=maxd*maxd;
    for(let i=0;i<motes.length;i++){ const a=motes[i];
      for(let j=i+1;j<motes.length;j++){ const b=motes[j],dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
        if(d2<md2){ const al=(1-Math.sqrt(d2)/maxd)*.07; ctx.strokeStyle="rgba(226,77,141,"+al+")"; ctx.lineWidth=dpr*.5;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); } } }
    for(const p of motes){ p.x+=p.vx;p.y+=p.vy;
      if(p.y<-12)p.y=h+12; if(p.x<-12)p.x=w+12; if(p.x>w+12)p.x=-12;
      ctx.shadowBlur=p.r*3; ctx.shadowColor="rgba(255,45,128,"+p.a+")";
      ctx.fillStyle="rgba(226,77,141,"+p.a+")";
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832); ctx.fill(); }
    ctx.shadowBlur=0; ctx.globalCompositeOperation="source-over";
    requestAnimationFrame(loop);
  }
  let tm2; addEventListener("resize",()=>{clearTimeout(tm2);tm2=setTimeout(init,180);});
  init(); requestAnimationFrame(loop);
})();
</script>
</body>
